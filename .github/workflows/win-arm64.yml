name: Windows ARM64 Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-win-arm64:
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify ARM64 native package
        shell: pwsh
        run: |
          $package = "nuget-packages/MuPDF.NativeAssets.Windows.arm64.1.28.0.2.nupkg"
          if (-not (Test-Path $package)) {
            throw "Missing $package. Copy MuPDF.NativeAssets.Windows.arm64.1.28.0.2.nupkg into nuget-packages/ before running CI."
          }

      - name: Restore
        run: dotnet restore -r win-arm64

      - name: Build
        run: dotnet build -c Release -r win-arm64 --no-restore

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path bin)) {
            throw "Expected bin/ folder after build."
          }

          $files = Get-ChildItem -Path bin -Recurse -File
          if (-not $files) {
            throw "bin/ folder is empty."
          }

          Write-Host "Build output ($($files.Count) file(s)):"
          $files | ForEach-Object { Write-Host $_.FullName }

      - name: Upload bin folder
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-bin
          path: bin/
          if-no-files-found: error
