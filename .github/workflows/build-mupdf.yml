name: Build MuPDF C# Bindings (ARM64)

# Based on:
# https://mupdf.readthedocs.io/en/latest/reference/cxx-and-derived-bindings.html
#
# Official Windows C# script:
#   py -m venv pylocal
#   .\pylocal\Scripts\activate
#   python -m pip install --upgrade pip
#   pip install libclang swig setuptools
#   cd mupdf && python scripts/mupdfwrap.py -b --csharp all

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-bindings:
    runs-on: windows-11-arm

    steps:
      # Must match the MuPDF version MuPDF.NET 3.28.1.4 was built against (1.28.0).
      # Building from master produces ABI-incompatible DLLs that crash with 0xC0000005.
      - name: Clone MuPDF 1.28.0
        run: |
          git clone --branch 1.28.0 --recursive --depth 1 --shallow-submodules https://github.com/ArtifexSoftware/mupdf.git

      - name: Set up Python (ARM64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'

      - name: Configure VS2022 ARM64 toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64
          vsversion: 2022

      - name: Create venv and install libclang/swig/setuptools
        shell: pwsh
        run: |
          python -m venv pylocal
          & .\pylocal\Scripts\python.exe -m pip install --upgrade pip
          & .\pylocal\Scripts\python.exe -m pip install libclang swig setuptools pipcl
          & .\pylocal\Scripts\python.exe -c "import clang.cindex; print('clang OK:', clang.cindex.__file__)"

      - name: Build C# bindings
        shell: pwsh
        run: |
          Set-Location mupdf
          & ..\pylocal\Scripts\python.exe scripts\mupdfwrap.py --vs-upgrade 1 -b --csharp all

      - name: Stage and verify ARM64 DLLs
        shell: pwsh
        run: |
          function Get-PeArch([string]$path) {
            $bytes = [System.IO.File]::ReadAllBytes($path)
            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            switch ($machine) {
              0x014c { 'x86' }
              0x8664 { 'x64' }
              0xAA64 { 'ARM64' }
              default { "Unknown(0x$($machine.ToString('X')))" }
            }
          }

          $candidates = @(
            Get-ChildItem -Path "mupdf/build" -Recurse -Filter "mupdfcsharp.dll" -ErrorAction SilentlyContinue
          )
          if (-not $candidates) {
            throw "mupdfcsharp.dll was not produced under mupdf/build."
          }

          $csharp = $candidates | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $dir = $csharp.Directory.FullName
          $cpp = Join-Path $dir "mupdfcpp64.dll"
          if (-not (Test-Path $cpp)) {
            throw "Expected mupdfcpp64.dll next to $($csharp.FullName)"
          }

          Write-Host "Found build output in: $dir"
          New-Item -ItemType Directory -Force -Path "artifacts/win-arm64" | Out-Null
          Copy-Item $csharp.FullName "artifacts/win-arm64/mupdfcsharp.dll" -Force
          Copy-Item $cpp "artifacts/win-arm64/mupdfcpp64.dll" -Force

          foreach ($dll in @("artifacts/win-arm64/mupdfcsharp.dll", "artifacts/win-arm64/mupdfcpp64.dll")) {
            $arch = Get-PeArch $dll
            Write-Host "$(Split-Path $dll -Leaf): $arch"
            if ($arch -ne 'ARM64') {
              throw "$dll is $arch, not ARM64. mupdfwrap still built the wrong VS platform."
            }
          }

      - name: Upload ARM64 native DLLs
        uses: actions/upload-artifact@v4
        with:
          name: mupdf-csharp-win-arm64
          path: artifacts/win-arm64/
          if-no-files-found: error
