name: Build MuPDF C# Bindings (ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Enables a manual trigger button on GitHub

jobs:
  build-bindings:
    runs-on: windows-11-arm  # Native Windows ARM64 runner

    steps:
      # 1. Clone MuPDF version 1.28.0 recursively
      - name: Clone MuPDF
        run: |
          git clone --branch 1.28.0 git://git.ghostscript.com/mupdf.git --recursive

      # 2. Set up native ARM64 Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'

      # 3. Upgrade Pip and install the required dependencies (libclang, swig, setuptools)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install libclang swig setuptools

      # 4. Set up MSVC (Visual Studio 2022) Native ARM64 compiler paths
      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      # 5. Build C# wrapper bindings using your exact build command
      - name: Run Build Script
        shell: cmd
        run: |
          cd mupdf
          python scripts/mupdfwrap.py -d build/shared-tesseract-release --vs-upgrade 1 -b --csharp all

      # 6. Upload compiled DLLs and generated C# bindings as artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mupdf-csharp-arm64-binaries
          path: |
            mupdf/build/shared-tesseract-release/
            mupdf/platform/csharp/
          if-no-files-found: warn